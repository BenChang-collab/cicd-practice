name: Python CI
 
on:
  push:
    branches:
      - master
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: 拉取程式碼
        uses: actions/checkout@v4
 
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: 安裝依賴
        run: pip install -r requirements.txt
 
      - name: 執行測試
        run: python -m pytest -v
  docker-push: 
    runs-on: ubuntu-latest
    needs: test
    env: 
      IMAGES_NAME: ${{ secrets.DOCKER_NAME }}/my-first-image
    steps: 
      - uses: actions/checkout@v4
      - run: docker build -t $IMAGES_NAME:latest .
      - run: docker run -d --name app -p 5000:5000 $IMAGES_NAME:latest && sleep 5 && curl http://127.0.0.1:5000/health
      - uses: docker/login-actions@v3
        with: 
          username: ${{ secrets.DOCKER_NAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - run: docker push $IMAGES_NAME:latest